[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Run the project's own tests:  forge test --match-contract RevenueBatchAnchorTest
# (forge-std ships its own test suite under lib/; scope to our contract to skip it.)
# Deps: forge install foundry-rs/forge-std — lib/ is gitignored.
